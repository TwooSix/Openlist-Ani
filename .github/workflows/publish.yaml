name: Build and Publish Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish-pypi:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    environment: 
      name: publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --no-dev

      - name: Build and publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv build
          uv publish

  build-and-push-docker:
    name: Build Docker Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: 
      name: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
          tags: |
            twosix26/openlist-ani:${{ github.ref_name }}-${{ matrix.arch }}
            twosix26/openlist-ani:latest-${{ matrix.arch }}

  merge-docker-manifest:
    name: Merge Docker Manifest
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    environment: 
      name: publish
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create multi-arch tags
        run: |
          docker buildx imagetools create \
            -t twosix26/openlist-ani:${{ github.ref_name }} \
            twosix26/openlist-ani:${{ github.ref_name }}-amd64 \
            twosix26/openlist-ani:${{ github.ref_name }}-arm64

          docker buildx imagetools create \
            -t twosix26/openlist-ani:latest \
            twosix26/openlist-ani:latest-amd64 \
            twosix26/openlist-ani:latest-arm64
